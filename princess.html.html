<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>✨ My Princess Daily Planner ✨</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23ff65a3%22/><text y=%2268%22 x=%2212%22 font-size=%2262%22>👑</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%23ff65a3%22/><text y=%2268%22 x=%2212%22 font-size=%2262%22>👑</text></svg>">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Princess Planner">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #ffe5ec 0%, #ffc0cbd2 35%, #cbe3db 70%, #d6e2f0 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --royal-pink: #ff65a3;
            --soft-pink: #fff0f5;
            --text-dark: #4a2834;
            --text-muted: #8b6b77;
            --danger: #ff4d6d;
            --success: #2ec4b6;
            --border: #fbcfe8;
            --gold-glow: 0 0 10px rgba(255, 215, 0, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background: var(--bg-gradient);
            background-size: 300% 300%;
            animation: gradientMove 15s ease infinite;
            min-height: 100vh;
            color: var(--text-dark);
            padding: env(safe-area-inset-top, 1rem) 1rem calc(env(safe-area-inset-bottom, 1rem) + 1rem) 1rem;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow-x: hidden;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Ultra-Fast Responsive Sparkle CSS Particles */
        .sparkle-particle {
            position: fixed;
            pointer-events: none;
            font-size: 1.2rem;
            z-index: 9999;
            transform: translate(-50%, -50%);
            will-change: transform, opacity;
            animation: sparkleFade 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            text-shadow: 0 0 5px #fff, 0 0 10px #ff65a3;
        }

        @keyframes sparkleFade {
            0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--mx)), calc(-50% + var(--my))) scale(1.3); opacity: 0; }
        }

        /* Main Container Responsive Layout Wrapper */
        .app-container {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(255, 101, 163, 0.15), 0 0 20px rgba(255, 255, 255, 0.6);
            padding: 2rem 1.5rem 6rem 1.5rem;
            position: relative;
            min-height: 620px;
        }

        /* Header Setup */
        .dashboard-header {
            text-align: center;
            margin-bottom: 1.5rem;
            border-bottom: 2px dashed var(--border);
            padding-bottom: 1.25rem;
            position: relative;
        }

        .dashboard-header::before, .dashboard-header::after {
            content: '✨'; position: absolute; bottom: 1rem; font-size: 1.2rem; text-shadow: var(--gold-glow);
        }
        .dashboard-header::before { left: 1rem; }
        .dashboard-header::after { right: 1rem; }

        .current-day {
            font-size: 2.4rem; font-weight: 800; color: var(--royal-pink);
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 101, 163, 0.2);
            text-transform: capitalize;
        }
        .current-date { font-size: 1rem; color: var(--text-dark); font-weight: 600; margin-top: 0.2rem; letter-spacing: 0.5px; }

        /* Floating Plus Add Button */
        .fab-btn {
            position: absolute; top: 2rem; right: 1.5rem;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            color: white; border: none; width: 3.2rem; height: 3.2rem; border-radius: 50%;
            font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(255, 101, 163, 0.4), var(--gold-glow);
            transition: all 0.3s ease; z-index: 10;
        }

        /* Views Router Engine */
        .app-view { display: none; }
        .app-view.active-view { display: block; }

        .schedule-list, .history-list { display: flex; flex-direction: column; gap: 1rem; }
        .empty-state { text-align: center; color: var(--text-muted); padding: 3rem 1rem; font-style: italic; font-size: 0.95rem; }

        /* Flexible Mobile Cards */
        .activity-card {
            background: rgba(255, 255, 255, 0.92); border-left: 5px solid var(--royal-pink);
            border-radius: 1rem; padding: 1.25rem; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border); border-left: 5px solid var(--royal-pink);
        }

        .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 0.5rem; }
        .activity-title { font-size: 1.15rem; font-weight: 700; color: var(--text-dark); word-break: break-word; }

        /* Checklist Items Adjustments for Touch Targets */
        .activity-desc {
            display: none; font-size: 0.95rem; color: var(--text-dark); background: var(--soft-pink);
            padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px dashed var(--border); margin-top: 0.75rem;
            animation: viewFade 0.25s ease;
        }
        .activity-desc.show-notes { display: block; }

        .checklist-row {
            display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.5rem 0; 
            cursor: pointer; user-select: none; line-height: 1.4;
        }
        .checklist-cb { margin-top: 0.2rem; width: 1.15rem; height: 1.15rem; accent-color: var(--royal-pink); cursor: pointer; }
        .checklist-text { word-break: break-word; }
        .checklist-row.checked-strike .checklist-text { text-decoration: line-through; color: var(--text-muted); opacity: 0.7; }

        .card-meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 0.75rem; font-size: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
        .activity-days { color: var(--royal-pink); font-weight: 700; background: var(--soft-pink); padding: 0.2rem 0.6rem; border-radius: 1rem; text-transform: uppercase; }

        .card-actions { display: flex; flex-wrap: wrap; gap: 0.25rem; }
        .card-actions button { background: none; border: none; cursor: pointer; font-weight: 700; font-size: 0.85rem; margin-left: 0.5rem; padding: 0.25rem; transition: transform 0.2s; }

        .log-done-btn { 
            color: white !important; background: linear-gradient(135deg, #2ec4b6 0%, #0cbaba 100%) !important;
            padding: 0.4rem 1rem !important; border-radius: 2rem; box-shadow: 0 2px 6px rgba(46, 196, 182, 0.2);
        }
        .toggle-desc-btn { color: var(--royal-pink) !important; font-style: italic; }
        .edit-btn { color: #5c677d; }
        .delete-btn { color: var(--danger); }

        /* Calendar Lookup Shell */
        .toggle-utility-btn {
            background: white; border: 1px solid var(--border); color: var(--royal-pink); font-weight: 700;
            padding: 0.65rem 1rem; border-radius: 0.75rem; width: 100%; cursor: pointer; margin-bottom: 1rem;
            font-size: 0.9rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }

        .calendar-wrapper { display: none; background: white; border: 1px solid var(--border); border-radius: 1rem; padding: 1rem; margin-bottom: 1.5rem; }
        .calendar-wrapper.show-calendar { display: block; animation: viewFade 0.25s ease-out; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; font-weight: 700; margin-bottom: 0.75rem; color: var(--royal-pink); }
        .calendar-nav-btn { background: none; border: none; color: var(--royal-pink); font-size: 1.2rem; cursor: pointer; padding: 0.25rem 0.75rem; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.35rem; text-align: center; }
        .weekday-label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); }
        
        .calendar-day-cell { 
            font-size: 0.85rem; font-weight: 600; padding: 0.6rem 0; border-radius: 0.5rem; cursor: pointer; color: var(--text-dark); 
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .calendar-day-cell:hover { background: var(--soft-pink); }
        .calendar-day-cell.has-logs { background: #fff0f5; }
        .calendar-day-cell.has-logs::after { content: '✨'; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%); font-size: 0.5rem; }
        .calendar-day-cell.selected-day { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%) !important; color: white !important; box-shadow: var(--gold-glow); }
        .calendar-day-cell.other-month { color: #cbd5e1; pointer-events: none; }

        /* History Layouts */
        .history-card { background: white; border-radius: 0.75rem; padding: 0.85rem 1rem; border: 1px solid var(--border); border-left: 5px solid var(--success); }
        .history-time { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; font-weight: 600; }
        .history-section-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-dark); }

        /* Navigation Bar Bottom */
        .bottom-navbar {
            position: absolute; bottom: 0; left: 0; right: 0; height: 4.5rem;
            background: rgba(255, 255, 255, 0.95); border-top: 1px solid var(--border);
            border-bottom-left-radius: 1.8rem; border-bottom-right-radius: 1.8rem;
            display: flex; overflow: hidden; padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        .nav-tab {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: none; border: none; cursor: pointer; color: var(--text-muted); font-weight: 700; font-size: 0.85rem; gap: 0.25rem;
        }
        .nav-tab.active-tab { color: var(--royal-pink); }
        .nav-icon { font-size: 1.3rem; }

        /* Overlay Layout System Settings */
        .modal-overlay, .congrats-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(74, 40, 52, 0.4); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 100;
            padding: 1rem;
        }
        .modal-overlay.active, .congrats-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal {
            background: white; padding: 1.5rem; border-radius: 1.5rem;
            width: 100%; max-width: 440px; border: 2px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(74, 40, 52, 0.1);
            max-height: 90vh; overflow-y: auto;
        }

        .congrats-card {
            background: white; padding: 2.5rem 1.5rem; border-radius: 2rem;
            width: 100%; max-width: 380px; text-align: center; border: 3px solid #fbcfe8;
            box-shadow: 0 0 30px rgba(255, 101, 163, 0.4), var(--gold-glow);
            animation: popScale 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .congrats-icon { font-size: 3.5rem; margin-bottom: 1rem; display: inline-block; animation: bounce 2s infinite; }
        .congrats-card h2 { color: var(--royal-pink); margin-bottom: 0.5rem; font-size: 1.5rem; }
        .congrats-card p { color: var(--text-dark); font-weight: 600; font-size: 0.95rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 700; margin-bottom: 0.35rem; font-size: 0.85rem; }
        .form-group input[type="text"], .form-group textarea {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border);
            border-radius: 0.5rem; font-size: 0.95rem; background-color: var(--soft-pink); outline: none;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--royal-pink); background-color: white; }

        .day-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; }
        .day-checkbox { display: none; }
        .day-label { padding: 0.5rem 0.25rem; border: 1px solid var(--border); border-radius: 0.5rem; cursor: pointer; font-weight: 700; font-size: 0.8rem; background: white; text-align: center; display: block; }
        .day-checkbox:checked + .day-label { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; border-color: #ff758c; }

        .modal-buttons { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
        .btn { padding: 0.75rem 1.25rem; border-radius: 0.5rem; border: none; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); color: white; }
        .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }

        @keyframes viewFade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popScale { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
</head>
<body>

    <div class="app-container">
        <button class="fab-btn" id="openModalBtn" title="Add Activity">+</button>

        <header class="dashboard-header">
            <div class="current-day" id="displayDay">...</div>
            <div class="current-date" id="displayDate">...</div>
        </header>

        <div id="boardView" class="app-view active-view">
            <main class="schedule-list" id="scheduleList"></main>
        </div>

        <div id="historyView" class="app-view">
            <button class="toggle-utility-btn" id="toggleCalendarBtn" onclick="toggleCalendarVisibility()">
                <span>📅</span> <span id="toggleCalendarBtnText">Open Calendar Lookup</span>
            </button>

            <div class="calendar-wrapper" id="calendarWrapper">
                <div class="calendar-header">
                    <button class="calendar-nav-btn" onclick="adjustMonth(-1)">❮</button>
                    <span id="calendarMonthYear">Month Year</span>
                    <button class="calendar-nav-btn" onclick="adjustMonth(1)">❯</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="history-section-title">
                <span id="historyScopeTitle">Today's Activity Records</span>
            </div>
            <main class="history-list" id="historyList"></main>
        </div>

        <nav class="bottom-navbar">
            <button class="nav-tab active-tab" onclick="switchTab('boardView', this)">
                <span class="nav-icon">👑</span>
                <span>My Board</span>
            </button>
            <button class="nav-tab" onclick="switchTab('historyView', this)">
                <span class="nav-icon">📖</span>
                <span>History Log</span>
            </button>
        </nav>
    </div>

    <div class="congrats-overlay" id="congratsOverlay">
        <div class="congrats-card">
            <span class="congrats-icon" id="congratsIcon">👑✨</span>
            <h2 id="congratsHeadline">Splendid Job!</h2>
            <p id="congratsMessage">Your task has been successfully logged into royal history.</p>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle">✨ Create Royal Activity ✨</h3>
            <form id="activityForm">
                <input type="hidden" id="editId">
                
                <div class="form-group">
                    <label for="title">Activity Name *</label>
                    <input type="text" id="title" required placeholder="e.g., Royal Ballet Workout">
                </div>

                <div class="form-group">
                    <label for="description">Steps / Notes (Each line becomes a cross-out checklist item)</label>
                    <textarea id="description" rows="4" placeholder="Line 1: Step One&#10;Line 2: Step Two"></textarea>
                </div>

                <div class="form-group">
                    <label>Repeating Days *</label>
                    <div class="day-selector">
                        <input type="checkbox" id="m-mon" value="monday" class="day-checkbox"><label for="m-mon" class="day-label">Mon</label>
                        <input type="checkbox" id="m-tue" value="tuesday" class="day-checkbox"><label for="m-tue" class="day-label">Tue</label>
                        <input type="checkbox" id="m-wed" value="wednesday" class="day-checkbox"><label for="m-wed" class="day-label">Wed</label>
                        <input type="checkbox" id="m-thu" value="thursday" class="day-checkbox"><label for="m-thu" class="day-label">Thu</label>
                        <input type="checkbox" id="m-fri" value="friday" class="day-checkbox"><label for="m-fri" class="day-label">Fri</label>
                        <input type="checkbox" id="m-sat" value="saturday" class="day-checkbox"><label for="m-sat" class="day-label">Sat</label>
                        <input type="checkbox" id="m-sun" value="sunday" class="day-checkbox"><label for="m-sun" class="day-label">Sun</label>
                    </div>
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-secondary" id="closeModalBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Activity</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const weekdayMapping = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        
        const praiseVault = [
            { icon: "👑✨", headline: "Magnificent, Princess!", message: "Another stunning achievement gracefully completed!" },
            { icon: "🩰🎀", headline: "Absolutely Perfect!", message: "You are executing your daily routines beautifully." },
            { icon: "💖🌸", headline: "Splendid Effort!", message: "Your dedication is truly inspiring to watch." },
            { icon: "⭐🔮", headline: "Pure Magic!", message: "Shining bright and checking items off your list like royalty!" },
            { icon: "🦋🧁", headline: "Lovely Job!", message: "Fabulous progress made on your daily tasks today." },
            { icon: "🌟🥂", headline: "Simply Radiant!", message: "Your tasks are completed with ultimate poise and style." },
            { icon: "💎🏰", headline: "Exquisite Work!", message: "Adding another successful milestone to the kingdom records." },
            { icon: "🦄🎵", headline: "Bravo, Princess!", message: "Wonderful momentum! Keep flourishing and thriving." },
            { icon: "🌷🕊️", headline: "So Graceful!", message: "You handled that with absolute ease and elegance." },
            { icon: "👑🍭", headline: "Triumphant Success!", message: "Fantastic job checking off your main daily goal!" }
        ];

        let activities = JSON.parse(localStorage.getItem('princessActivitiesData')) || [
            { id: 1, title: 'Princess Morning 👑', description: 'Apply face serum\nDrink warm lemon water\nMorning stretches', days: ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'] }
        ];
        let completedHistoryLogs = JSON.parse(localStorage.getItem('princessHistoryLogs')) || [];
        let partialChecklistState = JSON.parse(localStorage.getItem('partialChecklistState')) || {};

        let currentDayName = '';
        let todayDateKey = '';
        let calendarSelectedDateKey = ''; 
        let calendarFocusedMonth = new Date();
        let isCalendarVisible = false;
        let congratsTimer = null;

        let lastCoords = { x: 0, y: 0 };
        let activePointerMoved = false;

        window.onload = function() {
            todayDateKey = formatDateKey(new Date());
            
            syncSystemClock();
            renderActiveBoard();
            renderCalendarFramework();
            renderHistoryLogs();

            document.getElementById('openModalBtn').addEventListener('click', () => openModalForm());
            document.getElementById('closeModalBtn').addEventListener('click', closeModalForm);
            document.getElementById('activityForm').addEventListener('submit', handleFormSubmit);

            window.addEventListener('mousemove', (e) => savePointerPosition(e.clientX, e.clientY));
            window.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    savePointerPosition(e.touches[0].clientX, e.touches[0].clientY);
                }
            }, { passive: true });

            requestAnimationFrame(renderSparkleLoop);
            setInterval(syncSystemClock, 60000);
        };

        function savePointerPosition(x, y) {
            lastCoords.x = x;
            lastCoords.y = y;
            activePointerMoved = true;
        }

        function renderSparkleLoop() {
            if (activePointerMoved && Math.random() > 0.4) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle-particle';
                const sparklesIcons = ['✨', '⭐', '💫', '🌸', '💖'];
                sparkle.textContent = sparklesIcons[Math.floor(Math.random() * sparklesIcons.length)];
                
                sparkle.style.left = `${lastCoords.x}px`;
                sparkle.style.top = `${lastCoords.y}px`;
                
                const moveX = (Math.random() - 0.5) * 60;
                const moveY = (Math.random() - 0.5) * 60;
                sparkle.style.setProperty('--mx', `${moveX}px`);
                sparkle.style.setProperty('--my', `${moveY}px`);

                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 600);
                activePointerMoved = false;
            }
            requestAnimationFrame(renderSparkleLoop);
        }

        function switchTab(viewId, element) {
            document.querySelectorAll('.app-view').forEach(view => view.classList.remove('active-view'));
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active-tab'));
            
            document.getElementById(viewId).classList.add('active-view');
            element.classList.add('active-tab');

            document.getElementById('openModalBtn').style.display = (viewId === 'boardView') ? 'flex' : 'none';
            
            if (viewId === 'historyView') {
                calendarSelectedDateKey = ''; 
                isCalendarVisible = false;
                document.getElementById('calendarWrapper').classList.remove('show-calendar');
                document.getElementById('toggleCalendarBtnText').textContent = "Open Calendar Lookup";
                renderCalendarFramework();
                renderHistoryLogs();
            }
        }

        function syncSystemClock() {
            const today = new Date();
            currentDayName = weekdayMapping[today.getDay()];
            todayDateKey = formatDateKey(today);
            document.getElementById('displayDay').textContent = currentDayName + " ✨";
            document.getElementById('displayDate').textContent = today.toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
        }

        function formatDateKey(dateObj) {
            return `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}-${String(dateObj.getDate()).padStart(2, '0')}`;
        }

        function renderActiveBoard() {
            const listContainer = document.getElementById('scheduleList');
            listContainer.innerHTML = '';

            const activeTodayTasks = activities.filter(act => {
                return act.days.includes(currentDayName) && !completedHistoryLogs.some(log => log.activityId === act.id && log.dateKey === todayDateKey);
            });

            if (activeTodayTasks.length === 0) {
                listContainer.innerHTML = `<div class="empty-state">✨ All activities completed or empty for today! Time to relax, Princess! ✨</div>`;
                return;
            }

            activeTodayTasks.forEach(act => {
                const card = document.createElement('div');
                card.className = 'activity-card';
                
                const cleanDesc = act.description ? act.description.trim() : '';
                let descToggleBtn = '';
                let descContentBlock = '';
                
                if (cleanDesc) {
                    descToggleBtn = `<button class="toggle-desc-btn" onclick="toggleDescriptionDisplay(this)">ℹ️ Show Notes</button>`;
                    const lines = cleanDesc.split('\n');
                    let checklistHTML = '';
                    
                    lines.forEach((line, index) => {
                        if (!line.trim()) return;
                        const uniqueKey = `${act.id}_${index}`;
                        const isChecked = partialChecklistState[uniqueKey] ? 'checked-strike' : '';
                        const isCheckedAttr = partialChecklistState[uniqueKey] ? 'checked' : '';
                        
                        checklistHTML += `
                            <div class="checklist-row ${isChecked}" onclick="toggleChecklistItem('${act.id}', ${index}, this, event)">
                                <input type="checkbox" class="checklist-cb" ${isCheckedAttr} onclick="event.stopPropagation(); toggleChecklistItem('${act.id}', ${index}, this.parentNode, event)">
                                <span class="checklist-text">${escapeMarkup(line)}</span>
                            </div>
                        `;
                    });
                    descContentBlock = `<div class="activity-desc">${checklistHTML}</div>`;
                }

                const tagOutput = act.days.length === 7 ? 'Everyday' : act.days.map(d => d.slice(0, 3)).join(', ');

                card.innerHTML = `
                    <div class="card-top">
                        <div class="activity-title">⭐ ${escapeMarkup(act.title)}</div>
                        <div class="card-actions">
                            <button class="log-done-btn" onclick="logActivityCompletion(${act.id})">✓ Done</button>
                        </div>
                    </div>
                    ${descContentBlock}
                    <div class="card-meta-row">
                        <span class="activity-days">🔁 ${tagOutput}</span>
                        <div class="card-actions">
                            ${descToggleBtn}
                            <button class="edit-btn" onclick="editActivity(${act.id})">Edit</button>
                            <button class="delete-btn" onclick="deleteActivity(${act.id})">Remove</button>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        window.toggleChecklistItem = function(actId, index, rowEl, event) {
            if(event) event.preventDefault();
            const uniqueKey = `${actId}_${index}`;
            const checkbox = rowEl.querySelector('.checklist-cb');
            
            if (rowEl.classList.contains('checked-strike')) {
                rowEl.classList.remove('checked-strike');
                checkbox.checked = false;
                delete partialChecklistState[uniqueKey];
            } else {
                rowEl.classList.add('checked-strike');
                checkbox.checked = true;
                partialChecklistState[uniqueKey] = true;
            }
            localStorage.setItem('partialChecklistState', JSON.stringify(partialChecklistState));
        };

        window.toggleDescriptionDisplay = function(btnElement) {
            const cardElement = btnElement.closest('.activity-card');
            const descContainer = cardElement.querySelector('.activity-desc');
            if (descContainer) {
                const isOpen = descContainer.classList.toggle('show-notes');
                btnElement.textContent = isOpen ? "ℹ️ Hide Notes" : "ℹ️ Show Notes";
            }
        };

        window.toggleCalendarVisibility = function() {
            const wrapper = document.getElementById('calendarWrapper');
            const btnText = document.getElementById('toggleCalendarBtnText');
            isCalendarVisible = !isCalendarVisible;
            
            if (isCalendarVisible) {
                wrapper.classList.add('show-calendar');
                btnText.textContent = "Hide Calendar Lookup";
            } else {
                wrapper.classList.remove('show-calendar');
                btnText.textContent = "Open Calendar Lookup";
                calendarSelectedDateKey = '';
                renderCalendarFramework();
                renderHistoryLogs();
            }
        };

        window.logActivityCompletion = function(id) {
            const target = activities.find(a => a.id === id);
            if (!target) return;

            const now = new Date();
            completedHistoryLogs.push({
                id: Date.now(),
                activityId: target.id,
                title: target.title,
                dateKey: todayDateKey, 
                timeCompleted: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })
            });

            localStorage.setItem('princessHistoryLogs', JSON.stringify(completedHistoryLogs));
            
            for (let key in partialChecklistState) {
                if (key.startsWith(id + '_')) delete partialChecklistState[key];
            }
            localStorage.setItem('partialChecklistState', JSON.stringify(partialChecklistState));
            renderActiveBoard();

            const selectedPraise = praiseVault[Math.floor(Math.random() * praiseVault.length)];
            document.getElementById('congratsIcon').textContent = selectedPraise.icon;
            document.getElementById('congratsHeadline').textContent = selectedPraise.headline;
            document.getElementById('congratsMessage').textContent = selectedPraise.message;

            document.getElementById('congratsOverlay').classList.add('active');

            if (congratsTimer) clearTimeout(congratsTimer);

            congratsTimer = setTimeout(() => {
                closeCongratsPopup();
            }, 3000);
        };

        window.closeCongratsPopup = function() {
            document.getElementById('congratsOverlay').classList.remove('active');
        };

        function renderCalendarFramework() {
            const grid = document.getElementById('calendarGrid');
            const monthYearLabel = document.getElementById('calendarMonthYear');
            grid.innerHTML = '';
            
            monthYearLabel.textContent = calendarFocusedMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' }) + " ✨";

            const labels = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            labels.forEach(l => {
                const lbl = document.createElement('div'); lbl.className = 'weekday-label'; lbl.textContent = l; grid.appendChild(lbl);
            });

            const year = calendarFocusedMonth.getFullYear();
            const month = calendarFocusedMonth.getMonth();
            const firstDayIndex = new Date(year, month, 1).getDay();
            const totalDaysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDayIndex; i++) {
                const pad = document.createElement('div'); pad.className = 'calendar-day-cell other-month'; grid.appendChild(pad);
            }

            for (let day = 1; day <= totalDaysInMonth; day++) {
                const cellDate = new Date(year, month, day);
                const dateKey = formatDateKey(cellDate);
                
                const cell = document.createElement('div');
                cell.className = 'calendar-day-cell';
                cell.textContent = day;

                if (completedHistoryLogs.some(l => l.dateKey === dateKey)) cell.classList.add('has-logs');
                if ((calendarSelectedDateKey && dateKey === calendarSelectedDateKey) || (!calendarSelectedDateKey && dateKey === todayDateKey)) {
                    cell.classList.add('selected-day');
                }

                cell.addEventListener('click', () => {
                    calendarSelectedDateKey = dateKey;
                    toggleCalendarVisibility();
                    renderHistoryLogs();
                });
                grid.appendChild(cell);
            }
        }

        window.adjustMonth = function(delta) {
            calendarFocusedMonth.setMonth(calendarFocusedMonth.getMonth() + delta);
            renderCalendarFramework();
        };

        function renderHistoryLogs() {
            const targetContainer = document.getElementById('historyList');
            const scopeLabel = document.getElementById('historyScopeTitle');
            targetContainer.innerHTML = '';

            const activeTargetKey = calendarSelectedDateKey || todayDateKey;
            const parsedDate = new Date(activeTargetKey);
            const formattedHeadline = parsedDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

            scopeLabel.textContent = !calendarSelectedDateKey ? "🌸 Today's Activity Records" : `📜 Logs for ${formattedHeadline}`;

            const filteredHistoryLogs = completedHistoryLogs.filter(log => log.dateKey === activeTargetKey);

            if (filteredHistoryLogs.length === 0) {
                targetContainer.innerHTML = `<div class="empty-state">No activities logged on this date.</div>`;
                return;
            }

            filteredHistoryLogs.forEach(log => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="activity-title" style="font-size:1rem;">💖 ${escapeMarkup(log.title)}</div>
                    <div class="history-time">Completed at: ${log.timeCompleted}</div>
                `;
                targetContainer.appendChild(card);
            });
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            const idVal = document.getElementById('editId').value;
            const titleVal = document.getElementById('title').value.trim();
            const descVal = document.getElementById('description').value;
            
            const selectedDays = [];
            document.querySelectorAll('.day-checkbox:checked').forEach(box => selectedDays.push(box.value));

            if (selectedDays.length === 0) {
                alert("Please assign this activity to at least one active day!");
                return;
            }

            if (idVal) {
                const idx = activities.findIndex(a => a.id == idVal);
                if (idx !== -1) activities[idx] = { id: parseInt(idVal), title: titleVal, description: descVal, days: selectedDays };
            } else {
                activities.push({ id: Date.now(), title: titleVal, description: descVal, days: selectedDays });
            }

            localStorage.setItem('princessActivitiesData', JSON.stringify(activities));
            renderActiveBoard();
            closeModalForm();
        }

        function openModalForm(editId = null) {
            document.getElementById('modalOverlay').classList.add('active');
            if (editId) {
                document.getElementById('modalTitle').textContent = "✨ Edit Royal Activity ✨";
                const act = activities.find(a => a.id === editId);
                document.getElementById('editId').value = act.id;
                document.getElementById('title').value = act.title;
                document.getElementById('description').value = act.description;
                document.querySelectorAll('.day-checkbox').forEach(bx => bx.checked = act.days.includes(bx.value));
            } else {
                document.getElementById('modalTitle').textContent = "✨ Create Royal Activity ✨";
                document.getElementById('activityForm').reset();
                document.getElementById('editId').value = '';
                document.querySelectorAll('.day-checkbox').forEach(bx => bx.checked = (bx.value === currentDayName));
            }
        }

        function closeModalForm() { document.getElementById('modalOverlay').classList.remove('active'); }
        window.editActivity = function(id) { openModalForm(id); };
        window.deleteActivity = function(id) {
            if (confirm("Remove this activity from your routine?")) {
                activities = activities.filter(a => a.id !== id);
                localStorage.setItem('princessActivitiesData', JSON.stringify(activities));
                renderActiveBoard();
            }
        };

        function escapeMarkup(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, t => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[t] || t));
        }
    </script>
</body>
</html>
