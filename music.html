<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Blue Music Player</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
        }
        .container { max-width: 500px; margin: auto; text-align: center; }
        
        .vinyl {
            width: 200px; height: 200px; border-radius: 50%;
            background: #000; border: 15px solid #1a365d;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
            animation: spin 5s linear infinite paused; border-top: 15px solid #3182ce;
        }
        .vinyl.playing { animation-play-state: running; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .controls { margin: 20px 0; }
        button { background: #3182ce; border: none; color: white; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        
        .playlist-item { 
            background: rgba(255,255,255,0.1); padding: 10px; margin: 8px 0; 
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Dark Blue Player</h2>
    <input type="file" id="audioInput" accept="audio/*,video/*">
    
    <div class="vinyl" id="vinyl">💿</div>
    <audio id="audioPlayer" controls></audio>

    <div class="controls">
        <button onclick="toggleLoop()">Loop: OFF</button>
        <button onclick="toggleShuffle()">Shuffle: OFF</button>
    </div>

    <h3>My Library</h3>
    <div id="library"></div>
</div>

<script>
    let library = [];
    let isLoop = false;
    let isShuffle = false;
    let currentIdx = 0;

    const audioPlayer = document.getElementById('audioPlayer');
    const vinyl = document.getElementById('vinyl');

    // Handle Upload
    document.getElementById('audioInput').onchange = (e) => {
        const file = e.target.files[0];
        const track = { name: file.name, url: URL.createObjectURL(file) };
        library.push(track);
        renderLibrary();
    };

    function renderLibrary() {
        const list = document.getElementById('library');
        list.innerHTML = '';
        library.forEach((track, index) => {
            const div = document.createElement('div');
            div.className = 'playlist-item';
            div.innerHTML = `
                <span onclick="playTrack(${index})">${track.name}</span>
                <button onclick="addToPlaylist('${track.name}')">+</button>
                <button onclick="removeTrack(${index})">Delete</button>
            `;
            list.appendChild(div);
        });
    }

    function playTrack(index) {
        currentIdx = index;
        audioPlayer.src = library[index].url;
        audioPlayer.play();
        vinyl.classList.add('playing');
    }

    function addToPlaylist(name) {
        const listName = prompt("Enter Playlist Name:");
        if (listName) alert(`Added ${name} to ${listName}`);
    }

    function removeTrack(index) {
        library.splice(index, 1);
        renderLibrary();
    }

    function toggleLoop() { isLoop = !isLoop; audioPlayer.loop = isLoop; event.target.innerText = `Loop: ${isLoop ? 'ON' : 'OFF'}`; }
    
    audioPlayer.onended = () => {
        if (isShuffle) playTrack(Math.floor(Math.random() * library.length));
        else if (currentIdx < library.length - 1) playTrack(currentIdx + 1);
    };
</script>

</body>
</html>
